services:
  - type: static_site
    name: digitalradicalz-pwa
    repo: https://github.com/CHAMA18/DigitalRadicalz-mobile
    branch: web-deploy
    publishPath: .
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /canvaskit/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /main.dart.js
        name: Cache-Control
        value: public, max-age=86400
      - path: /flutter_service_worker.js
        name: Cache-Control
        value: no-cache
