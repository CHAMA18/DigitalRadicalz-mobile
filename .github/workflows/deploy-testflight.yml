# ──────────────────────────────────────────────────────
# DigitalRadicalz — TestFlight Deployment Pipeline
# ──────────────────────────────────────────────────────
# Triggers:
#   • Manual dispatch (workflow_dispatch) — primary
#   • Push to main/develop branch
#
# Pipeline:
#   1. Checkout code
#   2. Set up Flutter SDK
#   3. Install dependencies (flutter pub get + pod install)
#   4. Decode App Store Connect API key
#   5. Build & archive iOS app via Fastlane
#   6. Upload IPA to TestFlight
# ──────────────────────────────────────────────────────

name: Deploy to TestFlight

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"

permissions:
  contents: read
  actions: write

concurrency:
  group: ios-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.27.4"
  APP_BUNDLE_ID: "com.mycompany.brightwave"
  TEAM_ID: "852QBVFRUN"

jobs:
  build-and-deploy:
    name: Build iOS & Deploy to TestFlight
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      # ── 1. Checkout ──────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Flutter ────────────────────────
      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          cache: true

      - name: Verify Flutter installation
        run: |
          flutter --version
          flutter doctor -v

      # ── 3. Install dependencies ──────────────────
      - name: Flutter pub get
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: ios
        run: |
          gem install cocoapods --no-document
          pod install --repo-update

      # ── 4. Set up App Store Connect API Key ─────
      - name: Decode App Store Connect API Key
        env:
          API_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          mkdir -p ~/private_keys
          echo "$API_KEY_P8_BASE64" | base64 --decode > ~/private_keys/AuthKey_A2NL3S75NT.p8
          echo "API key decoded successfully"
          ls -la ~/private_keys/AuthKey_A2NL3S75NT.p8

      # ── 5. Install Fastlane ─────────────────────
      - name: Install Fastlane
        run: |
          gem install fastlane --no-document
          fastlane --version

      # ── 6. Build & Upload to TestFlight ─────────
      - name: Build and Deploy to TestFlight
        working-directory: ios
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_PATH: "/Users/runner/private_keys/AuthKey_A2NL3S75NT.p8"
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8
        run: |
          fastlane testflight

      # ── 7. Upload Artifacts ─────────────────────
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-artifacts
          path: |
            ios/build/
          retention-days: 14

      # ── 8. Clean up ─────────────────────────────
      - name: Clean up API key
        if: always()
        run: |
          rm -rf ~/private_keys
          echo "API key cleaned up"

      # ── 9. Summary ─────────────────────────────
      - name: Deployment Summary
        if: success()
        run: |
          echo "========================================"
          echo "  DigitalRadicalz — TestFlight Deployment"
          echo "========================================"
          echo "  Build completed successfully"
          echo "  IPA uploaded to TestFlight"
          echo ""
          echo "  Bundle ID: com.mycompany.brightwave"
          echo "  Team ID:   852QBVFRUN"
          echo "  Branch:    ${{ github.ref_name }}"
          echo "  Commit:    ${{ github.sha }}"
          echo "  Run:       ${{ github.run_number }}"
          echo "========================================"
