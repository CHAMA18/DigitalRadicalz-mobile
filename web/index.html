<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DigitalRadicalz">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- PWA meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="DigitalRadicalz">

  <!-- Open Graph & SEO tags -->
  <meta property="og:title" content="DigitalRadicalz" />
  <meta property="og:description" content="Community platform for connection, collaboration, and growth." />
  <meta property="og:type" content="website" />
  <meta name="twitter:title" content="DigitalRadicalz" />
  <meta name="twitter:description" content="Community platform for connection, collaboration, and growth." />
  <meta name="twitter:card" content="summary" />

  <title>DigitalRadicalz</title>
  <meta name="description" content="DigitalRadicalz — Community platform for connection, collaboration, and growth." />

  <!-- Status Bar color in Safari browser (iOS) and PWA -->
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#1F7A8C">
  <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#1D2428">

  <link rel="manifest" href="manifest.json">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <style>
    /* Splash screen while Flutter loads */
    body {
      margin: 0;
      padding: 0;
      background-color: #1D2428;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.5s ease-in;
    }
    .splash-logo {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      margin-bottom: 24px;
    }
    .splash-text {
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .splash-sub {
      color: #95A1AC;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      margin-top: 8px;
    }
    .splash-spinner {
      margin-top: 32px;
      width: 32px;
      height: 32px;
      border: 3px solid rgba(31, 122, 140, 0.3);
      border-top-color: #1F7A8C;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <svg class="splash-logo" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="120" height="120" rx="24" fill="#1F7A8C"/>
      <text x="50%" y="42%" dominant-baseline="middle" text-anchor="middle" fill="white" font-family="sans-serif" font-size="28" font-weight="bold">DRz</text>
      <text x="50%" y="68%" dominant-baseline="middle" text-anchor="middle" fill="#39D2C0" font-family="sans-serif" font-size="11">DIGITAL</text>
      <text x="50%" y="82%" dominant-baseline="middle" text-anchor="middle" fill="#39D2C0" font-family="sans-serif" font-size="11">RADICALZ</text>
    </svg>
    <div class="splash-text">DigitalRadicalz</div>
    <div class="splash-sub">Community · Collaboration · Growth</div>
    <div class="splash-spinner"></div>
  </div>

  <script>
    // Remove splash once Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      var splash = document.getElementById('splash');
      if (splash) {
        splash.style.transition = 'opacity 0.3s ease-out';
        splash.style.opacity = '0';
        setTimeout(function() { splash.remove(); }, 300);
      }
    });

    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('flutter_service_worker.js');
      });
    }
  </script>

  <script>
    {{flutter_bootstrap_js}}
  </script>
</body>
</html>
