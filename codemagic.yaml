# ──────────────────────────────────────────────────────
# DigitalRadicalz — Codemagic CI/CD Configuration
# ──────────────────────────────────────────────────────
# Codemagic provides free macOS runners for Flutter projects.
# This configuration builds the iOS IPA and uploads to TestFlight.
#
# Secrets are stored in the "app-store-connect" variable group
# (configured via Codemagic API).
# ──────────────────────────────────────────────────────

workflows:
  ios-testflight:
    name: DigitalRadicalz TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mycompany.brightwave
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.mycompany.brightwave"
        TEAM_ID: "852QBVFRUN"
      groups:
        - app-store-connect

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: develop
          include: true

    scripts:
      - name: Set up local properties
        script: echo "flutter.minSdkVersion=21" > "$CM_BUILD_DIR/android/local.properties"

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Set up App Store Connect API Key
        script: |
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8
          ls -la ~/private_keys/

      - name: Set build number
        script: |
          # Use epoch timestamp as build number for uniqueness
          export BUILD_NUMBER=$(($(date +%s)))
          echo "Build number: $BUILD_NUMBER"

      - name: Build iOS IPA
        script: |
          flutter build ipa \
            --release \
            --export-method app-store

      - name: Upload to TestFlight via altool
        script: |
          find build/ios/ipa -name "*.ipa" -exec echo "Found IPA: {}" \;
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found, checking archive..."
            find build/ios -name "*.ipa" 2>/dev/null
            find . -name "*.ipa" 2>/dev/null
            exit 1
          fi
          echo "Uploading IPA: $IPA_PATH"
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --show-progress

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - ci@digitalradicalz.com
        notify:
          success: true
          failure: true
