# ──────────────────────────────────────────────────────
# DigitalRadicalz — Codemagic CI/CD Configuration
# ──────────────────────────────────────────────────────
# Builds iOS IPA in release mode and uploads to TestFlight.
# Strategy:
#   1. Archive with automatic signing (development identity)
#      and -allowProvisioningUpdates using the API key
#   2. Export archive with app-store distribution method
#      using the API key for provisioning
# ──────────────────────────────────────────────────────

workflows:
  ios-testflight:
    name: DigitalRadicalz iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.mycompany.brightwave"
        TEAM_ID: "852QBVFRUN"
      groups:
        - app-store-connect

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Set up local properties
        script: echo "flutter.minSdkVersion=21" > "$CM_BUILD_DIR/android/local.properties"

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios && pod install || true

      - name: Set up App Store Connect API Key
        script: |
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8
          chmod 600 ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8
          ls -la ~/private_keys/

      - name: Set build number
        script: |
          BUILD_NUMBER=$(($(date +%s)))
          echo "Build number: $BUILD_NUMBER"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/Runner/Info.plist 2>/dev/null || true

      - name: Build and export iOS IPA
        script: |
          set -eo pipefail

          cd ios

          echo "=== Step 1: Building iOS archive ==="
          # Use automatic signing with -allowProvisioningUpdates
          # The API key in ~/private_keys/ enables Xcode to manage profiles
          # We do NOT override CODE_SIGN_IDENTITY — let Xcode use development
          # signing for the archive, then re-sign for distribution during export
          xcodebuild archive \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath ../build/ios/archive/Runner.xcarchive \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            -allowProvisioningDeviceRegistration \
            -authenticationKeyPath ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            2>&1 | tee /tmp/archive.log

          echo ""
          echo "=== Archive built successfully ==="
          ls -la ../build/ios/archive/ 2>/dev/null

          # Create ExportOptions.plist for App Store distribution
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF

          echo ""
          echo "=== Step 2: Exporting IPA for App Store distribution ==="
          xcodebuild -exportArchive \
            -archivePath ../build/ios/archive/Runner.xcarchive \
            -exportPath ../build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            2>&1 | tee /tmp/export.log

          echo ""
          echo "=== IPA exported successfully ==="
          find ../build/ios -name "*.ipa" 2>/dev/null

      - name: Upload to TestFlight
        script: |
          set -e

          IPA_PATH=$(find build/ios/ipa -name "*.ipa" 2>/dev/null | head -1)
          if [ -z "$IPA_PATH" ]; then
            IPA_PATH=$(find build/ios -name "*.ipa" 2>/dev/null | head -1)
          fi
          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: No IPA found!"
            exit 1
          fi

          echo "Found IPA: $IPA_PATH"
          echo "File size: $(ls -lh "$IPA_PATH" | awk '{print $5}')"
          echo ""
          echo "Uploading to TestFlight..."
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --show-progress

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - chungu@thestackone.com
        notify:
          success: true
          failure: true
