# ──────────────────────────────────────────────────────
# DigitalRadicalz — Codemagic CI/CD Configuration
# ──────────────────────────────────────────────────────
# Builds iOS IPA in release mode and uploads to TestFlight
# using App Store Connect API key authentication.
#
# Code signing is handled manually via xcodebuild with
# -allowProvisioningUpdates and API key auth flags.
#
# Required environment variables (in "app-store-connect" group):
#   APP_STORE_CONNECT_KEY_ID     — Apple API Key ID
#   APP_STORE_CONNECT_ISSUER_ID  — Apple API Issuer ID
#   APP_STORE_CONNECT_PRIVATE_KEY — Full P8 key contents
# ──────────────────────────────────────────────────────

workflows:
  ios-testflight:
    name: DigitalRadicalz iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.mycompany.brightwave"
        TEAM_ID: "852QBVFRUN"
      groups:
        - app-store-connect

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Set up local properties
        script: echo "flutter.minSdkVersion=21" > "$CM_BUILD_DIR/android/local.properties"

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios && pod install || true

      - name: Set up App Store Connect API Key
        script: |
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8
          chmod 600 ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8
          ls -la ~/private_keys/

      - name: Set build number
        script: |
          BUILD_NUMBER=$(($(date +%s)))
          echo "Build number: $BUILD_NUMBER"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/Runner/Info.plist 2>/dev/null || true

      - name: Build and export iOS IPA
        script: |
          set -eo pipefail

          echo "=== Building iOS archive ==="
          cd ios

          # Build archive with xcodebuild, allowing automatic provisioning
          xcodebuild archive \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath ../build/ios/archive/Runner.xcarchive \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            2>&1 | tee /tmp/archive.log

          echo ""
          echo "=== Archive completed ==="
          ls -la ../build/ios/archive/ 2>/dev/null || echo "Archive dir not found"

          # Create ExportOptions.plist
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>852QBVFRUN</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF

          echo ""
          echo "=== Exporting IPA ==="
          xcodebuild -exportArchive \
            -archivePath ../build/ios/archive/Runner.xcarchive \
            -exportPath ../build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            2>&1 | tee /tmp/export.log

          echo ""
          echo "=== Export completed ==="
          ls -la ../build/ios/ipa/ 2>/dev/null || echo "IPA dir not found"

      - name: Upload to TestFlight
        script: |
          set -e

          IPA_PATH=$(find build/ios/ipa -name "*.ipa" 2>/dev/null | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: No IPA found!"
            find build/ios -name "*.ipa" 2>/dev/null
            exit 1
          fi

          echo "Found IPA: $IPA_PATH"
          echo "File size: $(ls -lh "$IPA_PATH" | awk '{print $5}')"
          echo ""
          echo "Uploading to TestFlight..."
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --show-progress

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - chungu@thestackone.com
        notify:
          success: true
          failure: true
