# ──────────────────────────────────────────────────────
# DigitalRadicalz — Codemagic CI/CD Configuration
# ──────────────────────────────────────────────────────
# Builds iOS IPA in release mode and uploads to TestFlight
# using App Store Connect API key authentication.
#
# Required environment variables (in "app-store-connect" group):
#   APP_STORE_CONNECT_KEY_ID     — Apple API Key ID
#   APP_STORE_CONNECT_ISSUER_ID  — Apple API Issuer ID
#   APP_STORE_CONNECT_PRIVATE_KEY — Full P8 key contents
# ──────────────────────────────────────────────────────

workflows:
  ios-testflight:
    name: DigitalRadicalz iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.mycompany.brightwave"
        TEAM_ID: "852QBVFRUN"
      groups:
        - app-store-connect

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Set up local properties
        script: echo "flutter.minSdkVersion=21" > "$CM_BUILD_DIR/android/local.properties"

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios && pod install || true

      - name: Set up App Store Connect API Key
        script: |
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8
          ls -la ~/private_keys/

      - name: Configure Xcode project for manual signing
        script: |
          # Set the development team in the Xcode project
          xcode-project use-profiles \
            --project ios/Runner.xcodeproj \
            2>/dev/null || true

          # Ensure the bundle identifier is set correctly
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.mycompany.brightwave" ios/Runner/Info.plist 2>/dev/null || true

          # Set build number from timestamp
          BUILD_NUMBER=$(($(date +%s)))
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/Runner/Info.plist 2>/dev/null || true
          echo "Build number: $BUILD_NUMBER"

      - name: Build iOS IPA (release, automatic signing)
        script: |
          # Build IPA using xcodebuild with allowProvisioningUpdates
          # This lets Xcode manage signing using the API key in ~/private_keys/
          cd ios

          # First, build the archive
          xcodebuild archive \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build/ios/archive/Runner.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            | xcpretty

          # Create export options plist
          cat > /tmp/ExportOptions.plist << 'EXPORT_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>852QBVFRUN</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EXPORT_EOF

          # Export the IPA
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/ios/archive/Runner.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            | xcpretty

      - name: Upload to TestFlight
        script: |
          IPA_PATH=$(find "$CM_BUILD_DIR/build/ios/ipa" -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: No IPA found!"
            find "$CM_BUILD_DIR/build/ios" -name "*.ipa" 2>/dev/null
            exit 1
          fi
          echo "Found IPA: $IPA_PATH"
          echo "Uploading to TestFlight..."
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --show-progress

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - chungu@thestackone.com
        notify:
          success: true
          failure: true
