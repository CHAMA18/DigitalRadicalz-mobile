# ──────────────────────────────────────────────────────
# DigitalRadicalz — Codemagic CI/CD Configuration
# ──────────────────────────────────────────────────────
# Builds iOS IPA in release mode and uploads to TestFlight
# using App Store Connect API key authentication.
#
# Required environment variables (in "app-store-connect" group):
#   APP_STORE_CONNECT_KEY_ID     — Apple API Key ID
#   APP_STORE_CONNECT_ISSUER_ID  — Apple API Issuer ID
#   APP_STORE_CONNECT_PRIVATE_KEY — Full P8 key contents
# ──────────────────────────────────────────────────────

workflows:
  ios-testflight:
    name: DigitalRadicalz iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mycompany.brightwave
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.mycompany.brightwave"
        TEAM_ID: "852QBVFRUN"
      groups:
        - app-store-connect

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Set up local properties
        script: echo "flutter.minSdkVersion=21" > "$CM_BUILD_DIR/android/local.properties"

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios && pod install || true

      - name: Set up App Store Connect API Key
        script: |
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8
          ls -la ~/private_keys/

      - name: Set build number
        script: |
          BUILD_NUMBER=$(($(date +%s)))
          echo "Build number: $BUILD_NUMBER"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/Runner/Info.plist 2>/dev/null || true

      - name: Build iOS IPA (release)
        script: |
          set -e
          set -o pipefail

          # Build the IPA using flutter
          flutter build ipa \
            --release \
            --export-method app-store \
            2>&1 | tee /tmp/flutter_build.log

          echo ""
          echo "=== Build output ==="
          find build/ios -name "*.ipa" 2>/dev/null || echo "No IPA found in build/ios"
          find build/ios -name "*.xcarchive" 2>/dev/null || echo "No xcarchive found in build/ios"

      - name: Debug — list IPA files
        script: |
          echo "Searching for IPA files..."
          find . -name "*.ipa" 2>/dev/null || echo "No IPA found anywhere"
          echo ""
          echo "Build directory contents:"
          ls -laR build/ios/ 2>/dev/null || echo "build/ios/ not found"

      - name: Upload to TestFlight
        script: |
          set -e

          # Search for IPA in multiple possible locations
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" 2>/dev/null | head -1)
          if [ -z "$IPA_PATH" ]; then
            IPA_PATH=$(find build/ios -name "*.ipa" 2>/dev/null | head -1)
          fi
          if [ -z "$IPA_PATH" ]; then
            IPA_PATH=$(find . -name "*.ipa" 2>/dev/null | head -1)
          fi

          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: No IPA found anywhere!"
            exit 1
          fi

          echo "Found IPA: $IPA_PATH"
          echo "File size: $(ls -lh "$IPA_PATH" | awk '{print $5}')"
          echo ""
          echo "Uploading to TestFlight..."
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --show-progress

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - chungu@thestackone.com
        notify:
          success: true
          failure: true
