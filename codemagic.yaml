# ──────────────────────────────────────────────────────
# DigitalRadicalz — Codemagic CI/CD Configuration
# ──────────────────────────────────────────────────────
# Builds iOS IPA in release mode and uploads to TestFlight
# using App Store Connect API key authentication.
#
# Required environment variables (in "app-store-connect" group):
#   APP_STORE_CONNECT_KEY_ID     — Apple API Key ID
#   APP_STORE_CONNECT_ISSUER_ID  — Apple API Issuer ID
#   APP_STORE_CONNECT_PRIVATE_KEY — Full P8 key contents
# ──────────────────────────────────────────────────────

workflows:
  ios-testflight:
    name: DigitalRadicalz iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mycompany.brightwave
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.mycompany.brightwave"
        TEAM_ID: "852QBVFRUN"
      groups:
        - app-store-connect

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Set up local properties
        script: echo "flutter.minSdkVersion=21" > "$CM_BUILD_DIR/android/local.properties"

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios && pod install || true

      - name: Set up App Store Connect API Key for signing
        script: |
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8
          ls -la ~/private_keys/

      - name: Set build number from timestamp
        script: |
          export BUILD_NUMBER=$(($(date +%s)))
          echo "Build number: $BUILD_NUMBER"
          # Update the build number in the Xcode project
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$CM_BUILD_DIR/ios/Runner/Info.plist" 2>/dev/null || true

      - name: Build iOS IPA (release)
        script: |
          flutter build ipa \
            --release \
            --export-method app-store

      - name: Upload to TestFlight
        script: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: No IPA found in build/ios/ipa/"
            find build/ios -name "*.ipa" 2>/dev/null
            find . -name "*.ipa" 2>/dev/null
            exit 1
          fi
          echo "Found IPA: $IPA_PATH"
          echo "Uploading to TestFlight..."
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --show-progress

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - chungu@thestackone.com
        notify:
          success: true
          failure: true
